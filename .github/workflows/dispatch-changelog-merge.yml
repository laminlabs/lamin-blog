# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
# On merged PR to main, notify lamin-docs to merge docs/changelog/soon/blog.md into 2026.md.
on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

jobs:
  dispatch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger lamin-docs changelog merge
        env:
          TOKEN: ${{ secrets.LAMIN_BUILD_DOCS }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          set -euo pipefail
          test -n "$TOKEN" || { echo "Missing LAMIN_BUILD_DOCS"; exit 1; }
          payload=$(jq -n \
            --arg event_type "lamin-blog-merged" \
            --arg pr_number "$PR_NUMBER" \
            --arg merged_at "$MERGED_AT" \
            '{event_type: $event_type, client_payload: {pr_number: $pr_number, merged_at: $merged_at}}')
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$payload" \
            https://api.github.com/repos/laminlabs/lamin-docs/dispatches
